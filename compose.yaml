services:
  mariadb:
    image: mariadb:11.4
    container_name: moodle-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=512M
      - --max-connections=120
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-moodle}
      MYSQL_USER: ${MYSQL_USER:-moodle}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
    volumes:
      - moodle_db:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: moodle-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10

  moodle:
    build:
      context: .
      args:
        MOODLE_BRANCH: ${MOODLE_BRANCH:-MOODLE_520_STABLE}
    container_name: moodle
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MOODLE_DB_HOST: mariadb
      MOODLE_DB_NAME: ${MYSQL_DATABASE:-moodle}
      MOODLE_DB_USER: ${MYSQL_USER:-moodle}
      MOODLE_DB_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MOODLE_WWWROOT: ${MOODLE_WWWROOT:-https://moodle.curca.eu}
      MOODLE_DATAROOT: /var/moodledata
      MOODLE_REDIS_HOST: redis
      MOODLE_TIMEZONE: ${MOODLE_TIMEZONE:-Europe/Chisinau}
      MOODLE_SITE_FULLNAME: ${MOODLE_SITE_FULLNAME:-Aeolus Aviation Academy}
      MOODLE_SITE_SHORTNAME: ${MOODLE_SITE_SHORTNAME:-Aeolus LMS}
      MOODLE_ADMIN_USER: ${MOODLE_ADMIN_USER:-admin}
      MOODLE_ADMIN_EMAIL: ${MOODLE_ADMIN_EMAIL:-razrmd@gmail.com}
    volumes:
      - moodle_app:/var/www/html
      - moodle_data:/var/moodledata
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/login/index.php >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  cron:
    build:
      context: .
      args:
        MOODLE_BRANCH: ${MOODLE_BRANCH:-MOODLE_520_STABLE}
    container_name: moodle-cron
    restart: unless-stopped
    depends_on:
      moodle:
        condition: service_started
    command: ["/usr/local/bin/moodle-cron"]
    environment:
      MOODLE_DB_HOST: mariadb
      MOODLE_DB_NAME: ${MYSQL_DATABASE:-moodle}
      MOODLE_DB_USER: ${MYSQL_USER:-moodle}
      MOODLE_DB_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MOODLE_WWWROOT: ${MOODLE_WWWROOT:-https://moodle.curca.eu}
      MOODLE_DATAROOT: /var/moodledata
      MOODLE_REDIS_HOST: redis
    volumes:
      - moodle_app:/var/www/html
      - moodle_data:/var/moodledata
    networks:
      - internal

volumes:
  moodle_app:
  moodle_data:
  moodle_db:
  redis_data:

networks:
  internal:
  proxy:
    external: true
