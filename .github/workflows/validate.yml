name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  compose:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate compose
        run: docker compose --env-file .env.example config --quiet

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build Moodle image
        run: docker build --build-arg MOODLE_BRANCH=MOODLE_502_STABLE -t moodle-portainer:test .
